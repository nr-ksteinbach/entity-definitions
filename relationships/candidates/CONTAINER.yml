category: CONTAINER
lookups:
  - entityTypes:
    - domain: INFRA
      type: CONTAINER
    tags:
      matchingMode: ANY
      predicates:
        - tagKeys: ["k8s.containerId", "docker.containerId", "docker.shortContainerId"]
          field: containerId
    onMatch:
     onMultipleMatches: RELATE_ALL
    # Avoid spawning placeholder "uninstrumented" CONTAINER entities for every
    # OTel container.id that doesn't yet have a corresponding infra-agent /
    # OTel-synthesized CONTAINER. This mirrors the convention used in
    # KUBERNETES_POD.yml. Without NO_OP, every miss in the relationship-approver
    # path produces an entity, which can explode entity counts for OTel-only
    # workloads emitting ephemeral / sidecar / init container telemetry.
    onMiss:
      action: NO_OP
  - entityTypes:
      - domain: INFRA
        type: CONTAINER
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: [ "k8s.clusterName" ]
          field: k8sClusterName
        - tagKeys: [ "k8s.namespaceName" ]
          field: k8sNamespaceName
        - tagKeys: [ "k8s.podName" ]
          field: k8sPodName
        - tagKeys: [ "k8s.containerName" ]
          field: k8sContainerName
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP
